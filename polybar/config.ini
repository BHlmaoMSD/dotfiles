;   %name%
;   %icon%
;   %index%
; Default: %icon%  %name%
label-empty = %icon%
label-empty-foreground = 90e8f4ff

label-active-padding = 5
label-urgent-padding = 5
label-occupied-padding = 5
label-empty-padding = 5

[settings]
screenchange-reload = true
;compositing-background = xor
;compositing-background = screen
;compositing-foreground = source
;compositing-border = over
;pseudo-transparency = false

[global/wm]
margin-top = 5
margin-bottom = 5

; vim:ft=dosini

[bar/i3]
;monitor = ${env:MONITOR:HDMI-1}
width = 100%
height = 24
offset-y = 0%
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 0
line-color = #00564d

border-size = 0
border-color = #0D00564d

padding-left = 0
padding-right = 1

module-margin-left = 1
module-margin-right = 1

font-0 = Droid Sans Mono:style=Regular:pixelsize=10;2
font-1 = Font Awesome 5 Brands Regular:style=Regular:pixelsize=12;2
font-2 = unifont:fontformat=truetype:size=14:antialias=false;2
font-3 = siji:style=Regular:pixelsize=24;2
font-4 = Iosevka Nerd Font:pixelsize=10;3

modules-left = blank arch line xworkspaces
modules-center = 
modules-right = pulseaudio blank memory blank cpu blank date2 blank time blank power blank

separator =

tray-position = right
tray-detached = false
tray-maxsize = 23
tray-background = ${colors.background}
tray-offset-x = 0
tray-offset-y = 0
tray-padding = 0
tray-scale = 1.0


